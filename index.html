<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Portfolio Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            color: white;
            padding: 40px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #ccc;
            font-size: 1.1rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .stat-label {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
        }
        
        .positive {
            color: #4ade80;
        }
        
        .assets-section {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        h2 {
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        
        .asset-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .asset-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            transition: transform 0.2s, background 0.2s;
        }
        
        .asset-item:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.1);
        }
        
        .asset-name {
            font-weight: 600;
        }
        
        .asset-symbol {
            color: #aaa;
            margin-left: 10px;
            font-size: 0.9rem;
        }
        
        .asset-value {
            text-align: right;
        }
        
        .asset-price {
            font-weight: 600;
        }
        
        .asset-change {
            font-size: 0.85rem;
            margin-top: 4px;
        }
        
        footer {
            margin-top: 60px;
            text-align: center;
            color: #888;
            font-size: 0.9rem;
        }
        
        @media (max-width: 600px) {
            body {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Crypto Portfolio Dashboard</h1>
            <p class="subtitle">Built for @testuser_crypto</p>
        </header>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Portfolio Value</div>
                <div class="stat-value positive">$42,500</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">Assets</div>
                <div class="stat-value">3</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">24h Change</div>
                <div class="stat-value positive">+5.2%</div>
            </div>
        </div>
        
        <div class="assets-section">
            <h2>Your Assets</h2>
            <div class="asset-list">
                <div class="asset-item">
                    <div>
                        <span class="asset-name">Bitcoin</span>
                        <span class="asset-symbol">BTC</span>
                    </div>
                    <div class="asset-value">
                        <div class="asset-price">$25,000</div>
                        <div class="asset-change positive">+2.4%</div>
                    </div>
                </div>
                
                <div class="asset-item">
                    <div>
                        <span class="asset-name">Ethereum</span>
                        <span class="asset-symbol">ETH</span>
                    </div>
                    <div class="asset-value">
                        <div class="asset-price">$12,000</div>
                        <div class="asset-change positive">+3.1%</div>
                    </div>
                </div>
                
                <div class="asset-item">
                    <div>
                        <span class="asset-name">XRP</span>
                        <span class="asset-symbol">XRP</span>
                    </div>
                    <div class="asset-value">
                        <div class="asset-price">$5,500</div>
                        <div class="asset-change" style="color: #f87171;">-1.2%</div>
                    </div>
                </div>
            </div>
        </div>
        
        <footer>
            <p>Built with ❤️ by XRPcloud agents</p>
        </footer>
    </div>
</body>
</html>
